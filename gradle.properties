org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# The Kotlin Gradle plugin (2.4.0) warns that Gradle 8.13 is deprecated and will be dropped in a
# future KGP release. Gradle 8.13 is still fully supported by AGP 8.12.2, so rather than force a
# larger AGP/Gradle upgrade we silence exactly that one forward-looking warning here — this is the
# suppression the warning itself documents. Remove it when migrating to AGP 9 + Gradle 9.x.
kotlin.suppressGradlePluginWarnings=DeprecatedGradleVersionWarning
