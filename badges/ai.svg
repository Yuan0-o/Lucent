<svg xmlns="http://www.w3.org/2000/svg" width="208.69" height="34.00" viewBox="0 0 208.69 34.00" role="img" aria-label="Assistant: Cloud or On-Device">
  <defs>
    <clipPath id="clip-ai">
      <rect x="5" y="5" width="198.69" height="24" rx="12.0" ry="12.0"/>
    </clipPath>
    <linearGradient id="value-ai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e279a3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#70394f" stop-opacity="0.46"/>
    </linearGradient>
    <linearGradient id="sheen-ai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.50"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-ai" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.1"/>
    </filter>
    <filter id="shadow-ai" x="-40%" y="-60%" width="180%" height="240%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.1" result="blur"/>
      <feOffset in="blur" dx="0" dy="1" result="offsetBlur"/>
      <feComponentTransfer in="offsetBlur" result="shadow">
        <feFuncA type="linear" slope="0.38"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow-ai)">
    <g clip-path="url(#clip-ai)">
      <rect x="5" y="5" width="198.69" height="24" fill="#11111a" fill-opacity="0.76"/>
      <rect x="5" y="5" width="70.10" height="24" fill="#d7d7e2" fill-opacity="0.10"/>
      <rect x="75.10" y="5" width="128.59" height="24" fill="url(#value-ai)"/>
      <ellipse cx="52.69" cy="7" rx="55.63" ry="6" fill="#ffffff" fill-opacity="0.38" filter="url(#blur-ai)"/>
      <rect x="5" y="5" width="198.69" height="13.92" fill="url(#sheen-ai)"/>
      <rect x="74.60" y="5" width="1" height="24" fill="#ffffff" fill-opacity="0.20"/>
    </g>
    <rect x="5.5" y="5.5" width="197.69" height="23" rx="11.50" ry="11.50" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1"/>
  </g>

  <text x="40.05" y="17.60" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#000000" fill-opacity="0.35">Assistant</text>
  <text x="40.05" y="17.00" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#f2f2f6">Assistant</text>

  <text x="139.39" y="17.60" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#000000" fill-opacity="0.35">Cloud or On-Device</text>
  <text x="139.39" y="17.00" text-anchor="middle" dominant-baseline="central" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Cloud or On-Device</text>
</svg>
